<!doctype html>
<html>
  <head>
    <title>HTML5 constraints fixture</title>
  </head>
  <body>
    <div id="app">
      <form>
        <label for="price">Price</label>
        <input id="price" name="price" type="range" min="0" max="1000" step="10" />

        <label for="age">Age</label>
        <input id="age" name="age" type="number" min="18" max="120" />

        <label for="mobile">Mobile</label>
        <input id="mobile" name="mobile" type="tel" maxlength="10" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" maxlength="80" />

        <label for="about">About</label>
        <textarea id="about" name="about" maxlength="160"></textarea>

        <label for="title">Title</label>
        <input id="title" name="title" type="text" />

        <button type="submit">Save</button>
      </form>
    </div>
  </body>
</html>
