<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8fa"/>
    </linearGradient>
    <linearGradient id="dark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="dark-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0d1117" stop-opacity="0.04"/>
      <stop offset="80%" stop-color="#0d1117" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0d1117" stop-opacity="0.03"/>
      <stop offset="80%" stop-color="#0d1117" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0d1117" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-lg">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0d1117" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#center-glow)"/>

  <!-- Subtle grid — horizontal -->
  <g>
    <rect x="0" y="160" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="220" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="280" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="340" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="400" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="460" width="1280" height="0.5" fill="url(#line-fade-h)"/>
  </g>
  <!-- Subtle grid — vertical -->
  <g>
    <rect x="440" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
    <rect x="540" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
    <rect x="640" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
    <rect x="740" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
    <rect x="840" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
  </g>

  <!-- Shield — outer -->
  <path d="M640 115 L710 145 L710 235 Q710 285 640 320 Q570 285 570 235 L570 145 Z"
        fill="none" stroke="#0d1117" stroke-width="2" opacity="0.5" filter="url(#shadow-sm)"/>
  <!-- Shield — inner -->
  <path d="M640 135 L695 158 L695 230 Q695 270 640 298 Q585 270 585 230 L585 158 Z"
        fill="none" stroke="#0d1117" stroke-width="0.8" opacity="0.12"/>
  <!-- Shield — fill -->
  <path d="M640 115 L710 145 L710 235 Q710 285 640 320 Q570 285 570 235 L570 145 Z"
        fill="url(#dark-fade)" opacity="0.4"/>

  <!-- Terminal prompt inside shield -->
  <g filter="url(#shadow-sm)">
    <text x="623" y="228" font-family="'Courier New', 'Lucida Console', monospace" font-size="28" fill="#0d1117" opacity="0.7">$_</text>
  </g>

  <!-- Decorative circuit lines from shield -->
  <g stroke="#0d1117" stroke-width="0.5" opacity="0.06">
    <line x1="570" y1="190" x2="440" y2="190"/>
    <line x1="440" y1="190" x2="440" y2="240"/>
    <circle cx="440" cy="240" r="2" fill="#0d1117"/>
    <line x1="570" y1="230" x2="380" y2="230"/>
    <line x1="380" y1="230" x2="380" y2="180"/>
    <circle cx="380" cy="180" r="2" fill="#0d1117"/>
    <line x1="710" y1="190" x2="840" y2="190"/>
    <line x1="840" y1="190" x2="840" y2="240"/>
    <circle cx="840" cy="240" r="2" fill="#0d1117"/>
    <line x1="710" y1="230" x2="900" y2="230"/>
    <line x1="900" y1="230" x2="900" y2="180"/>
    <circle cx="900" cy="180" r="2" fill="#0d1117"/>
  </g>

  <!-- CYBERSTRIKE wordmark -->
  <text x="640" y="390" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="58" font-weight="700" fill="#0d1117" filter="url(#shadow-lg)" letter-spacing="8">CYBERSTRIKE</text>

  <!-- Tagline -->
  <text x="640" y="430" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="15" fill="#0d1117" opacity="0.4" letter-spacing="5">AUTONOMOUS OFFENSIVE SECURITY AGENT</text>

  <!-- Stat boxes -->
  <g font-family="'Courier New', 'Lucida Console', monospace">
    <!-- Box 1: Agents -->
    <rect x="195" y="480" width="180" height="64" rx="4" fill="#0d1117" fill-opacity="0.02" stroke="#0d1117" stroke-opacity="0.08" stroke-width="0.8"/>
    <text x="285" y="510" text-anchor="middle" font-size="22" font-weight="700" fill="#0d1117" opacity="0.8">13+</text>
    <text x="285" y="530" text-anchor="middle" font-size="10" fill="#0d1117" opacity="0.3" letter-spacing="2">SECURITY AGENTS</text>

    <!-- Box 2: OWASP -->
    <rect x="405" y="480" width="180" height="64" rx="4" fill="#0d1117" fill-opacity="0.02" stroke="#0d1117" stroke-opacity="0.08" stroke-width="0.8"/>
    <text x="495" y="510" text-anchor="middle" font-size="22" font-weight="700" fill="#0d1117" opacity="0.8">120+</text>
    <text x="495" y="530" text-anchor="middle" font-size="10" fill="#0d1117" opacity="0.3" letter-spacing="2">OWASP TESTS</text>

    <!-- Box 3: Providers -->
    <rect x="615" y="480" width="180" height="64" rx="4" fill="#0d1117" fill-opacity="0.02" stroke="#0d1117" stroke-opacity="0.08" stroke-width="0.8"/>
    <text x="705" y="510" text-anchor="middle" font-size="22" font-weight="700" fill="#0d1117" opacity="0.8">15+</text>
    <text x="705" y="530" text-anchor="middle" font-size="10" fill="#0d1117" opacity="0.3" letter-spacing="2">LLM PROVIDERS</text>

    <!-- Box 4: Tools -->
    <rect x="825" y="480" width="180" height="64" rx="4" fill="#0d1117" fill-opacity="0.02" stroke="#0d1117" stroke-opacity="0.08" stroke-width="0.8"/>
    <text x="915" y="510" text-anchor="middle" font-size="22" font-weight="700" fill="#0d1117" opacity="0.8">176</text>
    <text x="915" y="530" text-anchor="middle" font-size="10" fill="#0d1117" opacity="0.3" letter-spacing="2">MCP TOOLS</text>
  </g>

  <!-- Open Source badge -->
  <g transform="translate(640, 572)">
    <rect x="-72" y="-13" width="144" height="26" rx="13" fill="#0d1117" fill-opacity="0.03" stroke="#0d1117" stroke-opacity="0.1" stroke-width="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#0d1117" opacity="0.35" letter-spacing="2">OPEN SOURCE</text>
  </g>

  <!-- Domain -->
  <text x="640" y="618" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#0d1117" opacity="0.12" letter-spacing="3">CYBERSTRIKE.IO</text>

  <!-- Corner brackets -->
  <g stroke="#0d1117" stroke-width="1.5" opacity="0.06">
    <polyline points="2,35 2,2 35,2" fill="none"/>
    <polyline points="1245,2 1278,2 1278,35" fill="none"/>
    <polyline points="2,605 2,638 35,638" fill="none"/>
    <polyline points="1245,638 1278,638 1278,605" fill="none"/>
  </g>

  <!-- Top-left terminal decoration -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#0d1117" opacity="0.06">
    <text x="20" y="70">root@cyberstrike:~#</text>
    <text x="20" y="85">scanning target...</text>
    <text x="20" y="100">agents: 13 loaded</text>
  </g>

  <!-- Bottom-right terminal decoration -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#0d1117" opacity="0.06" text-anchor="end">
    <text x="1260" y="570">vuln_count: 7 critical</text>
    <text x="1260" y="585">report: generated</text>
    <text x="1260" y="600">status: complete</text>
  </g>
</svg>
