<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#1a1a2e" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="640"/><line x1="40" y1="0" x2="40" y2="640"/>
    <line x1="80" y1="0" x2="80" y2="640"/><line x1="120" y1="0" x2="120" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/><line x1="280" y1="0" x2="280" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/><line x1="360" y1="0" x2="360" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/><line x1="440" y1="0" x2="440" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="520" y1="0" x2="520" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/><line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/><line x1="680" y1="0" x2="680" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/><line x1="760" y1="0" x2="760" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="840" y1="0" x2="840" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/><line x1="920" y1="0" x2="920" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/><line x1="1000" y1="0" x2="1000" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/><line x1="1080" y1="0" x2="1080" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/><line x1="1160" y1="0" x2="1160" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/><line x1="1240" y1="0" x2="1240" y2="640"/>
    <line x1="1280" y1="0" x2="1280" y2="640"/>
    <line x1="0" y1="0" x2="1280" y2="0"/><line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/><line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="320" x2="1280" y2="320"/><line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="440" x2="1280" y2="440"/>
    <line x1="0" y1="480" x2="1280" y2="480"/><line x1="0" y1="520" x2="1280" y2="520"/>
    <line x1="0" y1="560" x2="1280" y2="560"/><line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="0" y1="640" x2="1280" y2="640"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(640, 200)" filter="url(#shadow)">
    <path d="M0-80 L50-60 L50 10 Q50 50 0 80 Q-50 50 -50 10 L-50-60 Z"
          fill="none" stroke="#1a1a2e" stroke-width="2.5" opacity="0.8"/>
    <path d="M0-55 L30-40 L30 5 Q30 35 0 55 Q-30 35 -30 5 L-30-40 Z"
          fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.2"/>
    <!-- Terminal cursor inside shield -->
    <text x="-12" y="8" font-family="monospace" font-size="40" fill="#1a1a2e" opacity="0.7">_</text>
    <rect x="-14" y="-15" width="3" height="30" fill="#1a1a2e" opacity="0.5"/>
  </g>

  <!-- CyberStrike wordmark -->
  <text x="640" y="340" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="64" font-weight="700" fill="url(#accent)" filter="url(#shadow)" letter-spacing="6">
    CYBERSTRIKE
  </text>

  <!-- Tagline -->
  <text x="640" y="395" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="18" fill="#1a1a2e" opacity="0.6" letter-spacing="4">
    AI-POWERED OFFENSIVE SECURITY AGENT PLATFORM
  </text>

  <!-- Feature pills -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#1a1a2e" opacity="0.4">
    <text x="310" y="470" text-anchor="middle">13+ AGENTS</text>
    <text x="520" y="470" text-anchor="middle">120+ OWASP TESTS</text>
    <text x="760" y="470" text-anchor="middle">15+ LLM PROVIDERS</text>
    <text x="970" y="470" text-anchor="middle">MCP PROTOCOL</text>
  </g>

  <!-- Separator dots between pills -->
  <g fill="#1a1a2e" opacity="0.2">
    <circle cx="415" cy="467" r="2"/>
    <circle cx="640" cy="467" r="2"/>
    <circle cx="865" cy="467" r="2"/>
  </g>

  <!-- Bottom domain -->
  <text x="640" y="570" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#cccccc" letter-spacing="3">
    CYBERSTRIKE.IO
  </text>

  <!-- Corner accents -->
  <g stroke="#1a1a2e" stroke-width="1" opacity="0.1">
    <polyline points="0,30 0,0 30,0" fill="none"/>
    <polyline points="1250,0 1280,0 1280,30" fill="none"/>
    <polyline points="0,610 0,640 30,640" fill="none"/>
    <polyline points="1250,640 1280,640 1280,610" fill="none"/>
  </g>
</svg>
