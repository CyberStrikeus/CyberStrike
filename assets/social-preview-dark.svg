<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#00cc33"/>
    </linearGradient>
    <linearGradient id="green-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00ff41" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#00ff41" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00ff41" stop-opacity="0.06"/>
      <stop offset="80%" stop-color="#00ff41" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-xl">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="shield-clip">
      <path d="M640 115 L710 145 L710 235 Q710 285 640 320 Q570 285 570 235 L570 145 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#center-glow)"/>

  <!-- Subtle grid — horizontal -->
  <g>
    <rect x="0" y="160" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="220" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="280" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="340" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="400" width="1280" height="0.5" fill="url(#line-fade-h)"/>
    <rect x="0" y="460" width="1280" height="0.5" fill="url(#line-fade-h)"/>
  </g>
  <!-- Subtle grid — vertical -->
  <g>
    <rect x="440" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
    <rect x="540" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
    <rect x="640" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
    <rect x="740" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
    <rect x="840" y="0" width="0.5" height="640" fill="url(#line-fade-v)"/>
  </g>

  <!-- Shield — outer -->
  <path d="M640 115 L710 145 L710 235 Q710 285 640 320 Q570 285 570 235 L570 145 Z"
        fill="none" stroke="#00ff41" stroke-width="2" opacity="0.6" filter="url(#glow-sm)"/>
  <!-- Shield — inner -->
  <path d="M640 135 L695 158 L695 230 Q695 270 640 298 Q585 270 585 230 L585 158 Z"
        fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.2"/>
  <!-- Shield — fill glow -->
  <path d="M640 115 L710 145 L710 235 Q710 285 640 320 Q570 285 570 235 L570 145 Z"
        fill="url(#green-fade)" opacity="0.5"/>

  <!-- Terminal prompt inside shield -->
  <g filter="url(#glow-sm)">
    <text x="623" y="228" font-family="'Courier New', 'Lucida Console', monospace" font-size="28" fill="#00ff41" opacity="0.9">$_</text>
  </g>

  <!-- Decorative circuit lines from shield -->
  <g stroke="#00ff41" stroke-width="0.5" opacity="0.12">
    <!-- Left side -->
    <line x1="570" y1="190" x2="440" y2="190"/>
    <line x1="440" y1="190" x2="440" y2="240"/>
    <circle cx="440" cy="240" r="2" fill="#00ff41"/>
    <line x1="570" y1="230" x2="380" y2="230"/>
    <line x1="380" y1="230" x2="380" y2="180"/>
    <circle cx="380" cy="180" r="2" fill="#00ff41"/>
    <!-- Right side -->
    <line x1="710" y1="190" x2="840" y2="190"/>
    <line x1="840" y1="190" x2="840" y2="240"/>
    <circle cx="840" cy="240" r="2" fill="#00ff41"/>
    <line x1="710" y1="230" x2="900" y2="230"/>
    <line x1="900" y1="230" x2="900" y2="180"/>
    <circle cx="900" cy="180" r="2" fill="#00ff41"/>
  </g>

  <!-- CYBERSTRIKE wordmark -->
  <text x="640" y="390" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="58" font-weight="700" fill="#00ff41" filter="url(#glow-lg)" letter-spacing="8">CYBERSTRIKE</text>

  <!-- Tagline -->
  <text x="640" y="430" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="15" fill="#00ff41" opacity="0.55" letter-spacing="5">AUTONOMOUS OFFENSIVE SECURITY AGENT</text>

  <!-- Stat boxes -->
  <g font-family="'Courier New', 'Lucida Console', monospace">
    <!-- Box 1: Agents -->
    <rect x="195" y="480" width="180" height="64" rx="4" fill="#00ff41" fill-opacity="0.04" stroke="#00ff41" stroke-opacity="0.15" stroke-width="0.8"/>
    <text x="285" y="510" text-anchor="middle" font-size="22" font-weight="700" fill="#00ff41" opacity="0.9" filter="url(#glow-sm)">13+</text>
    <text x="285" y="530" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">SECURITY AGENTS</text>

    <!-- Box 2: OWASP -->
    <rect x="405" y="480" width="180" height="64" rx="4" fill="#00ff41" fill-opacity="0.04" stroke="#00ff41" stroke-opacity="0.15" stroke-width="0.8"/>
    <text x="495" y="510" text-anchor="middle" font-size="22" font-weight="700" fill="#00ff41" opacity="0.9" filter="url(#glow-sm)">120+</text>
    <text x="495" y="530" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">OWASP TESTS</text>

    <!-- Box 3: Providers -->
    <rect x="615" y="480" width="180" height="64" rx="4" fill="#00ff41" fill-opacity="0.04" stroke="#00ff41" stroke-opacity="0.15" stroke-width="0.8"/>
    <text x="705" y="510" text-anchor="middle" font-size="22" font-weight="700" fill="#00ff41" opacity="0.9" filter="url(#glow-sm)">15+</text>
    <text x="705" y="530" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">LLM PROVIDERS</text>

    <!-- Box 4: Tools -->
    <rect x="825" y="480" width="180" height="64" rx="4" fill="#00ff41" fill-opacity="0.04" stroke="#00ff41" stroke-opacity="0.15" stroke-width="0.8"/>
    <text x="915" y="510" text-anchor="middle" font-size="22" font-weight="700" fill="#00ff41" opacity="0.9" filter="url(#glow-sm)">176</text>
    <text x="915" y="530" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">MCP TOOLS</text>
  </g>

  <!-- Open Source badge -->
  <g transform="translate(640, 572)">
    <rect x="-72" y="-13" width="144" height="26" rx="13" fill="#00ff41" fill-opacity="0.08" stroke="#00ff41" stroke-opacity="0.2" stroke-width="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" opacity="0.5" letter-spacing="2">OPEN SOURCE</text>
  </g>

  <!-- Domain -->
  <text x="640" y="618" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#222" letter-spacing="3">CYBERSTRIKE.IO</text>

  <!-- Corner brackets -->
  <g stroke="#00ff41" stroke-width="1.5" opacity="0.1">
    <polyline points="2,35 2,2 35,2" fill="none"/>
    <polyline points="1245,2 1278,2 1278,35" fill="none"/>
    <polyline points="2,605 2,638 35,638" fill="none"/>
    <polyline points="1245,638 1278,638 1278,605" fill="none"/>
  </g>

  <!-- Top-left terminal decoration -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#00ff41" opacity="0.1">
    <text x="20" y="70">root@cyberstrike:~#</text>
    <text x="20" y="85">scanning target...</text>
    <text x="20" y="100">agents: 13 loaded</text>
  </g>

  <!-- Bottom-right terminal decoration -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#00ff41" opacity="0.1" text-anchor="end">
    <text x="1260" y="570">vuln_count: 7 critical</text>
    <text x="1260" y="585">report: generated</text>
    <text x="1260" y="600">status: complete</text>
  </g>
</svg>
