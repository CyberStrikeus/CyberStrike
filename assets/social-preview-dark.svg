<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#00ff41" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="160" x2="1280" y2="160"/><line x1="0" y1="220" x2="1280" y2="220"/>
    <line x1="0" y1="280" x2="1280" y2="280"/><line x1="0" y1="340" x2="1280" y2="340"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="460" x2="1280" y2="460"/>
    <line x1="440" y1="0" x2="440" y2="640"/><line x1="540" y1="0" x2="540" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/><line x1="740" y1="0" x2="740" y2="640"/>
    <line x1="840" y1="0" x2="840" y2="640"/>
  </g>

  <!-- Shield — outer -->
  <path d="M640 108 L718 141 L718 240 Q718 296 640 332 Q562 296 562 240 L562 141 Z"
        fill="none" stroke="#00ff41" stroke-width="2.5" opacity="0.7"/>
  <!-- Shield — inner -->
  <path d="M640 132 L700 158 L700 233 Q700 278 640 308 Q580 278 580 233 L580 158 Z"
        fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.2"/>
  <!-- Shield — subtle fill -->
  <path d="M640 108 L718 141 L718 240 Q718 296 640 332 Q562 296 562 240 L562 141 Z"
        fill="#00ff41" opacity="0.03"/>

  <!-- Terminal prompt inside shield -->
  <text x="619" y="232" font-family="'Courier New', 'Lucida Console', monospace" font-size="32" fill="#00ff41" opacity="0.85">$_</text>

  <!-- Circuit lines from shield -->
  <g stroke="#00ff41" stroke-width="0.6" opacity="0.1">
    <line x1="562" y1="190" x2="430" y2="190"/><line x1="430" y1="190" x2="430" y2="245"/>
    <circle cx="430" cy="245" r="2.5" fill="#00ff41"/>
    <line x1="562" y1="235" x2="370" y2="235"/><line x1="370" y1="235" x2="370" y2="180"/>
    <circle cx="370" cy="180" r="2.5" fill="#00ff41"/>
    <line x1="718" y1="190" x2="850" y2="190"/><line x1="850" y1="190" x2="850" y2="245"/>
    <circle cx="850" cy="245" r="2.5" fill="#00ff41"/>
    <line x1="718" y1="235" x2="910" y2="235"/><line x1="910" y1="235" x2="910" y2="180"/>
    <circle cx="910" cy="180" r="2.5" fill="#00ff41"/>
  </g>

  <!-- CYBERSTRIKE wordmark -->
  <text x="640" y="395" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="60" font-weight="bold" fill="#00ff41" letter-spacing="8">CYBERSTRIKE</text>

  <!-- Tagline -->
  <text x="640" y="435" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="14" fill="#00ff41" opacity="0.5" letter-spacing="5">AUTONOMOUS OFFENSIVE SECURITY AGENT</text>

  <!-- Stat boxes -->
  <g font-family="'Courier New', 'Lucida Console', monospace">
    <rect x="195" y="478" width="180" height="62" rx="4" fill="#00ff41" fill-opacity="0.04" stroke="#00ff41" stroke-opacity="0.15" stroke-width="0.8"/>
    <text x="285" y="507" text-anchor="middle" font-size="22" font-weight="bold" fill="#00ff41" opacity="0.9">13+</text>
    <text x="285" y="527" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">SECURITY AGENTS</text>

    <rect x="405" y="478" width="180" height="62" rx="4" fill="#00ff41" fill-opacity="0.04" stroke="#00ff41" stroke-opacity="0.15" stroke-width="0.8"/>
    <text x="495" y="507" text-anchor="middle" font-size="22" font-weight="bold" fill="#00ff41" opacity="0.9">120+</text>
    <text x="495" y="527" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">OWASP TESTS</text>

    <rect x="615" y="478" width="180" height="62" rx="4" fill="#00ff41" fill-opacity="0.04" stroke="#00ff41" stroke-opacity="0.15" stroke-width="0.8"/>
    <text x="705" y="507" text-anchor="middle" font-size="22" font-weight="bold" fill="#00ff41" opacity="0.9">15+</text>
    <text x="705" y="527" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">LLM PROVIDERS</text>

    <rect x="825" y="478" width="180" height="62" rx="4" fill="#00ff41" fill-opacity="0.04" stroke="#00ff41" stroke-opacity="0.15" stroke-width="0.8"/>
    <text x="915" y="507" text-anchor="middle" font-size="22" font-weight="bold" fill="#00ff41" opacity="0.9">176</text>
    <text x="915" y="527" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">MCP TOOLS</text>
  </g>

  <!-- Open Source pill -->
  <rect x="568" y="557" width="144" height="26" rx="13" fill="#00ff41" fill-opacity="0.06" stroke="#00ff41" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="640" y="575" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" opacity="0.5" letter-spacing="2">OPEN SOURCE</text>

  <!-- Domain -->
  <text x="640" y="615" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#1a1a1a" letter-spacing="3">CYBERSTRIKE.IO</text>

  <!-- Corner brackets -->
  <g stroke="#00ff41" stroke-width="1.5" opacity="0.12">
    <polyline points="2,35 2,2 35,2" fill="none"/>
    <polyline points="1245,2 1278,2 1278,35" fill="none"/>
    <polyline points="2,605 2,638 35,638" fill="none"/>
    <polyline points="1245,638 1278,638 1278,605" fill="none"/>
  </g>

  <!-- Top-left terminal -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#00ff41" opacity="0.08">
    <text x="20" y="68">root@cyberstrike:~#</text>
    <text x="20" y="83">scanning target...</text>
    <text x="20" y="98">agents: 13 loaded</text>
  </g>

  <!-- Bottom-right terminal -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#00ff41" opacity="0.08" text-anchor="end">
    <text x="1260" y="568">vuln_count: 7 critical</text>
    <text x="1260" y="583">report: generated</text>
    <text x="1260" y="598">status: complete</text>
  </g>
</svg>
