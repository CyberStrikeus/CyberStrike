name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
runs:
  using: "composite"
  steps:
    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        key: ${{ github.repository }}-bun-cache-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ github.repository }}-bun-cache-${{ runner.os }}-
        path: ~/.bun

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: package.json

    - name: Install dependencies
      run: bun install
      shell: bash
