name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent
      description: Which agent were you using?
      options:
        - cyberstrike (default)
        - web-application
        - mobile-application
        - cloud-security
        - internal-network
        - proxy-idor
        - proxy-authz-bypass
        - proxy-mass-assignment
        - proxy-injection
        - proxy-authn
        - proxy-business-logic
        - proxy-ssrf
        - proxy-file-attacks
        - Other
    validations:
      required: false

  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: Which interface were you using?
      options:
        - CLI / TUI
        - Web UI
        - Desktop App (Tauri)
    validations:
      required: false

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      description: Which AI provider were you using?
      options:
        - Anthropic
        - OpenAI
        - Google
        - Amazon Bedrock
        - Azure
        - Groq
        - Mistral
        - OpenRouter
        - Local / Self-hosted
        - Other
    validations:
      required: false

  - type: input
    id: cyberstrike-version
    attributes:
      label: CyberStrike version
      description: Run `cyberstrike --version`
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 15.0, Ubuntu 24.04, Windows 11
    validations:
      required: false

  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: e.g., iTerm2, Ghostty, Alacritty, Windows Terminal
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs, error messages, or attach screenshots
      render: shell
    validations:
      required: false
