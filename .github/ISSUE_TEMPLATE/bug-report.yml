name: Bug Report
description: Report an issue that should be fixed
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug you encountered
      placeholder: What happened?
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent
      description: Which agent were you using?
      options:
        - build (default)
        - web-application
        - mobile-application
        - cloud-security
        - internal-network
        - other
    validations:
      required: false

  - type: input
    id: cyberstrike-version
    attributes:
      label: CyberStrike version
      description: What version of CyberStrike are you using? (run `cyberstrike --version`)
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false

  - type: textarea
    id: screenshot-or-link
    attributes:
      label: Screenshot and/or share link
      description: Run `/share` to get a share link, or attach a screenshot
      placeholder: Paste link or drag and drop screenshot here
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 15.0, Ubuntu 24.04, Windows 11
    validations:
      required: false

  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: e.g., iTerm2, Ghostty, Alacritty, Windows Terminal
    validations:
      required: false
