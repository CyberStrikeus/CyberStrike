name: Feature Request
description: Suggest a new feature or enhancement
labels: ["discussion"]
title: "[FEATURE]: "
body:
  - type: checkboxes
    id: verified
    attributes:
      label: Feature hasn't been suggested before.
      options:
        - label: I have verified this feature hasn't been suggested before.
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this feature relate to?
      options:
        - Security Agent
        - Security Tool / MCP
        - Knowledge Base / Skill
        - Browser Tool
        - CLI / TUI
        - Provider / Model
        - Desktop App
        - Plugin System
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: What do you want to add or change? Why would this be useful?
    validations:
      required: true
